kind = "web"
previewPath = "/"
title = "Birthday Cake Blow"
version = "1.0.0"
id = "artifacts/birthday-cake"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21561

[services.development]
run = "pnpm --filter @workspace/birthday-cake run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/birthday-cake", "run", "build" ]
publicDir = "artifacts/birthday-cake/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21561"
BASE_PATH = "/"
